name: ItaliaMarket
version: 1.0.0
main: it.italiamarket.ItaliaMarket
api-version: 1.21
description: Mercato virtuale italiano
authors: [ItaliaMarket]
depend: [Vault]
commands:
  market:
    description: Comando principale mercato
    usage: /market [sell <prezzo>|cerca <nome>|miei]
permissions:
  italiamarket.use:
    description: Usa il mercato
    default: true
  italiamarket.admin:
    description: Permessi admin mercato
    default: op
